name: release

# Build, sign and publish a Windows release whenever a version tag is pushed
# (e.g. `git tag v0.2.0 && git push origin v0.2.0`). tauri-action creates the
# GitHub Release and uploads `latest.json`, which the in-app updater reads from
# the "releases/latest/download/latest.json" endpoint.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # --- Metrics binaries bundled as resources (see tauri.conf.json) ---------
      # The ADLX shim (AMD GPU) compiles from vendored sources via build.rs, so it
      # needs no step here. PresentMon (NVIDIA FPS) and the cputemp sidecar (CPU
      # temp) are produced into src-tauri/binaries/ before the bundle is built.

      - name: Setup .NET (cputemp sidecar)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build CPU temp sidecar
        run: >
          dotnet publish src-tauri/sidecar/cputemp/cputemp.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -o src-tauri/binaries

      - name: Download PresentMon
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/GameTechDev/PresentMon/releases/download/v2.4.1/PresentMon-2.4.1-x64.exe" `
            -OutFile "src-tauri/binaries/PresentMon.exe"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Generate the keypair once with `npm run tauri signer generate` and
          # store these as repository secrets. The public key goes in
          # tauri.conf.json → plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Meteor ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
