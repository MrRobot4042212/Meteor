name: release

# Build, sign and publish a Windows release whenever a version tag is pushed
# (e.g. `git tag v0.2.0 && git push origin v0.2.0`). tauri-action creates the
# GitHub Release and uploads `latest.json`, which the in-app updater reads from
# the "releases/latest/download/latest.json" endpoint.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Generate the keypair once with `npm run tauri signer generate` and
          # store these as repository secrets. The public key goes in
          # tauri.conf.json → plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Meteor ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
