[package]
name = "nexo"
version = "0.1.0"
description = "Nexo - biblioteca unificada de juegos y apps"
authors = ["Alfonso"]
edition = "2021"
rust-version = "1.77"

# The library is what main.rs (and mobile entry points) call into.
[lib]
name = "nexo_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
steamlocate = "2.1"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
